name: Mirror issue to private repo                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                                                           
  on:                                                                                                                                                                                                                                                                      
    issues:                                                                                                                                                                                                                                                                
      types: [opened]                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                           
  jobs:                                                                                                                                                                                                                                                                    
    mirror:                                                                                                                                                                                                                                                                
      runs-on: ubuntu-latest                                                                                                                                                                                                                                               
      steps:                                                                                                                                                                                                                                                               
        - uses: actions/github-script@v7                                                                                                                                                                                                                                   
          with:                                                                                                                                                                                                                                                            
            github-token: ${{ secrets.MIRROR_TOKEN }}                                                                                                                                                                                                                      
            script: |                                                                                                                                                                                                                                                      
              const issue = context.payload.issue;                                                                                                                                                                                                                         
              await github.rest.issues.create({                                                                                                                                                                                                                            
                owner: 'ian-barber',                                                                                                                                                                                                                                       
                repo: 'dbw-linear-scans',                                                                                                                                                                                                                                  
                title: `[feedback] ${issue.title}`,                                                                                                                                                                                                                        
                body: `**From**: ${issue.html_url}\n\n${issue.body}`                                                                                                                                                                                                       
              });                    
